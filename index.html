<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="WHAT-Trainer">
<title>WHAT-Trainer</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --mbt: #ef4444; --mbt-bg: #fef2f2;
    --ifv: #f97316; --ifv-bg: #fff7ed;
    --apc: #ca8a04; --apc-bg: #fefce8;
    --eng: #a855f7; --eng-bg: #faf5ff;
    --ad:  #3b82f6; --ad-bg:  #eff6ff;
    --arty:#92400e; --arty-bg:#fdf4e8;
    --log: #16a34a; --log-bg: #f0fdf4;
    --master:#0f172a; --master-bg:#f8fafc;
    --w-col: #3b82f6; --h-col: #16a34a; --a-col: #ef4444; --t-col: #f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Nunito', 'Segoe UI', -apple-system, sans-serif;
    background: #f8fafc; color: #1e293b;
    max-width: 500px; margin: 0 auto;
    min-height: 100vh; min-height: 100dvh;
    overscroll-behavior: none;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  img { max-width: 100%; display: block; }
  button { font-family: inherit; cursor: pointer; border: none; }
  button:active { transform: scale(0.97); }
  ::-webkit-scrollbar { width: 0; height: 0; }
  .page { padding: 0 20px 40px; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pop { 0%{transform:scale(.8)} 50%{transform:scale(1.05)} 100%{transform:scale(1)} }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .fade-in { animation: fadeIn .3s ease both; }

  .card {
    background: #fff; border: 2px solid #e2e8f0; border-radius: 20px;
    padding: 16px 18px; transition: transform .12s, box-shadow .12s;
    box-shadow: 0 2px 8px rgba(0,0,0,.03);
  }
  .card:active { transform: scale(.98); }
  .card.locked { background: #f1f5f9; opacity: .45; pointer-events: none; }

  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    border-radius: 24px; padding: 4px 14px; font-size: 12px; font-weight: 800;
  }
  .btn-primary {
    width: 100%; padding: 16px; border-radius: 16px;
    font-weight: 800; font-size: 16px; color: #fff; border: none;
  }
  .progress-bar { height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; margin-bottom: 20px; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width .4s ease; }

  .what-card {
    background: #f8fafc; border: 1.5px solid #f1f5f9; border-radius: 14px;
    padding: 12px 14px; margin-bottom: 8px; cursor: pointer; transition: all .2s;
  }
  .what-card.open { border-color: currentColor; }
  .what-card .body { margin: 10px 0 0 42px; color: #475569; font-size: 13px; line-height: 1.7; animation: fadeIn .2s ease; }

  .vehicle-img {
    width: 100%; height: 220px; object-fit: cover; background: #e2e8f0;
  }
  .vehicle-img-sm {
    width: 100px; height: 64px; object-fit: cover; border-radius: 12px; background: #e2e8f0; flex-shrink: 0;
  }
  .img-fallback {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #f1f5f9; border: 2px dashed #cbd5e1; font-size: 11px; color: #94a3b8; font-weight: 700;
  }
  .img-fallback span.emoji { font-size: 28px; margin-bottom: 2px; }

  .feedback {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 20px 20px calc(20px + env(safe-area-inset-bottom, 14px)); z-index: 100;
    animation: slideUp .25s ease;
  }
  .feedback.correct { background: #f0fdf4; border-top: 3px solid #4ade80; }
  .feedback.wrong   { background: #fef2f2; border-top: 3px solid #ef4444; }
  .feedback .inner { max-width: 480px; margin: 0 auto; }

  .option-btn {
    background: #fff; border: 2px solid #e2e8f0; border-radius: 14px;
    padding: 14px; cursor: pointer; transition: all .15s; text-align: left;
    width: 100%; font-size: 13px; color: #475569; line-height: 1.5;
  }
  .option-btn.correct { background: #f0fdf4; border-color: #4ade80; }
  .option-btn.wrong   { background: #fef2f2; border-color: #ef4444; }

  .id-option {
    background: #fff; border: 2px solid #e2e8f0; border-radius: 14px;
    padding: 14px 10px; font-weight: 800; font-size: 14px; color: #0f172a;
    cursor: pointer; transition: all .15s; text-align: center;
  }
  .id-option.correct { background: #f0fdf4; border-color: #4ade80; color: #16a34a; }
  .id-option.wrong   { background: #fef2f2; border-color: #ef4444; color: #dc2626; }

  .hint-btn {
    width: 100%; padding: 10px; background: #fffbeb; border: 1.5px dashed #fde68a;
    border-radius: 12px; color: #92400e; font-size: 13px; font-weight: 700;
  }
  .tip-box {
    background: #fffbeb; border: 1.5px solid #fde68a; border-radius: 16px;
    padding: 14px 16px; cursor: pointer;
  }
  .tip-item { color: #78350f; font-size: 13px; line-height: 1.6; padding: 2px 0 2px 20px; position: relative; }
  .tip-item::before { content: '›'; position: absolute; left: 6px; color: #f59e0b; font-weight: 800; }

  .back-btn { background: none; color: #3b82f6; font-size: 15px; padding: 16px 0; font-weight: 700; }
  .topbar { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
  .counter { font-size: 13px; color: #94a3b8; font-weight: 700; }
</style>
</head>

function getV(id){return V.find(v=>v.id===id)}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]}return b}

// STATE
// ═══════════════════════════════════════════════════════════
let state = { screen:"home", mod:null, lesson:null, xp:0, done:{} };
try { const s=localStorage.getItem("what-trainer"); if(s){const p=JSON.parse(s);state.xp=p.xp||0;state.done=p.done||{}} } catch(e){}
function save(){try{localStorage.setItem("what-trainer",JSON.stringify({xp:state.xp,done:state.done}))}catch(e){}}

const app = document.getElementById("app");

function imgTag(v, cls, extraStyle="") {
  return `<img src="${v.img}" alt="${v.name}" class="${cls}" style="${extraStyle}"
    onerror="this.outerHTML='<div class=\\'${cls} img-fallback\\' style=\\'${extraStyle}\\'><span class=\\'emoji\\'>${CATS[v.cat]?.e||'🔲'}</span>${v.name}</div>'">`;
}

// RENDER
// ═══════════════════════════════════════════════════════════
function render() {
  if(state.screen==="home") renderHome();
  else if(state.screen==="module") renderModule();
  else if(state.screen==="learn") renderLearn();
  else if(state.screen==="quiz-what") renderQuizWhat();
  else if(state.screen==="quiz-id") renderQuizId();
  window.scrollTo({top:0,behavior:"instant"});
}

// ── HOME ──
function renderHome(){
  const mods = Object.entries(CATS).map(([id,info])=>({id,...info,vehicles:id==="master"?V.map(v=>v.id):V.filter(v=>v.cat===id).map(v=>v.id)}));
  const modKeys = mods.map(m=>m.id);

  let html = `<div class="page">
    <div style="text-align:center;padding:40px 0 20px">
      <div class="pill" style="background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#78350f;margin-bottom:16px;box-shadow:0 2px 12px rgba(245,158,11,.25)">

      </div>
      <h1 style="font-size:30px;font-weight:900;letter-spacing:-.5px;color:#0f172a">🎯 WHAT-Trainer</h1>

      <div style="display:inline-flex;gap:12px;margin-top:12px;background:#f1f5f9;border-radius:12px;padding:8px 16px">

      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:12px">`;

  mods.forEach((mod,mi)=>{
    const dc=["learn","quiz-what","quiz-id"].filter(t=>state.done[`${mod.id}-${t}`]).length;
    const prevId = mi>0?modKeys[mi-1]:null;
    const isMaster = mod.id==="master";
    const locked = isMaster ? mods.slice(0,-1).some(m=>!state.done[`${m.id}-learn`]) : (mi>0&&mi<mods.length-1&&!state.done[`${prevId}-learn`]);

    html+=`<div class="card ${locked?'locked':''}" onclick="${locked?'':`state.mod='${mod.id}';state.screen='module';render()`}" style="border-color:${locked?'#e2e8f0':mod.c+'33'};animation:fadeIn .3s ease ${mi*.05}s both">
      <div style="display:flex;align-items:center;gap:14px">
        <div style="width:48px;height:48px;border-radius:14px;background:${locked?'#e2e8f0':mod.bg};display:flex;align-items:center;justify-content:center;font-size:22px;border:2px solid ${locked?'#cbd5e1':mod.c+'44'};flex-shrink:0">${locked?'🔒':mod.e}</div>
        <div style="flex:1;min-width:0"><div style="font-weight:800;font-size:15px">${mod.l}</div><div style="font-size:12px;color:#94a3b8;margin-top:1px">${mod.vehicles.length} fordon</div></div>
        <div style="background:${dc===3?'#dcfce7':'#f1f5f9'};color:${dc===3?'#16a34a':'#94a3b8'};border-radius:10px;padding:4px 10px;font-size:13px;font-weight:800">${dc}/3</div>
      </div>
      <div style="display:flex;gap:4px;margin-top:10px">
        ${["learn","quiz-what","quiz-id"].map(t=>`<div style="flex:1;height:4px;border-radius:2px;background:${state.done[`${mod.id}-${t}`]?mod.c:'#e2e8f0'};transition:background .3s"></div>`).join("")}
      </div>
    </div>`;
  });

  html+=`</div></div>`;
  app.innerHTML=html;
}

// ── MODULE ──

  const lessons=[
    {type:"learn",icon:"📖",title:"Studera WHAT-analys",desc:"Se bilder & lär dig utmärkande drag"},

  lessons.forEach((l,li)=>{
    const done=state.done[`${catId}-${l.type}`];
    const locked=li>0&&!state.done[`${catId}-${lessons[li-1].type}`];
    html+=`<div class="card ${locked?'locked':''}" onclick="${locked?'':`startLesson('${catId}','${l.type}')`}" style="display:flex;align-items:center;gap:14px;${done?'background:#f0fdf4;border-color:#86efac':''}">
      <div style="width:44px;height:44px;border-radius:12px;background:${done?'#16a34a':locked?'#e2e8f0':info.bg};color:${done?'#fff':locked?'#94a3b8':info.c};display:flex;align-items:center;justify-content:center;font-size:${done?'20':'22'}px;font-weight:800;flex-shrink:0">${done?'✓':locked?'🔒':l.icon}</div>
      <div><div style="font-weight:800;font-size:15px">${l.title}</div><div style="font-size:12px;color:#94a3b8;margin-top:2px">${l.desc}</div></div>
    </div>`;
  });

  html+=`</div></div>`;
  app.innerHTML=html;

function startLesson(catId,type){
  state.mod=catId;state.lesson=type;state.screen=type;
  if(type==="learn") initLearn(catId);
  else if(type==="quiz-what") initQuizWhat(catId);
  else if(type==="quiz-id") initQuizId(catId);
}

// ── QUIZ-WHAT ──
let qwState={};
function initQuizWhat(catId){
  const vids=catId==="master"?V.map(v=>v.id):V.filter(v=>v.cat===catId).map(v=>v.id);
  const cats=["w","h","a","t"];
  const qs=shuffle(vids).map(vid=>{
    const cat=cats[Math.floor(Math.random()*cats.length)];
    const v=getV(vid);
    const wrongs=shuffle(vids.filter(id=>id!==vid)).slice(0,3);
    if(wrongs.length<3){const extras=shuffle(V.filter(x=>!vids.includes(x.id)).map(x=>x.id)).slice(0,3-wrongs.length);wrongs.push(...extras);}
    return{v,cat,options:shuffle([{txt:v.what[cat],vid,ok:true},...wrongs.map(w=>({txt:getV(w).what[cat],vid:w,ok:false}))])};
  });
  qwState={qs,qi:0,sel:null,score:0,catId};
  renderQuizWhat();
}
function renderQuizWhat(){
  const{qs,qi,sel,score,catId}=qwState;
  if(qi>=qs.length){
    const passed=score>=qs.length*.6;
    app.innerHTML=`<div class="page" style="padding-top:80px;text-align:center">
      <div style="font-size:64px;animation:pop .4s ease">${score>=qs.length*.8?'🏆':score>=qs.length*.5?'👍':'📚'}</div>
      <h2 style="font-size:28px;font-weight:900;margin-top:16px">${score}/${qs.length} rätt!</h2>
      <p style="color:#64748b;margin:8px 0 30px;font-size:15px">${passed?'Bra jobbat!':'Öva mer och försök igen!'}</p>
      <button class="btn-primary" style="background:${passed?'#16a34a':'#f59e0b'};max-width:280px;margin:0 auto" onclick="${passed?`state.done['${catId}-quiz-what']=true;save();`:''}state.screen='module';render()">
        ${passed?'FORTSÄTT ✓':'FÖRSÖK IGEN'}
      </button>
    </div>`;
    return;
  }
  const q=qs[qi];
  const v=q.v;

  let html=`<div class="page" style="padding-bottom:${sel!==null?'160':'40'}px">
    <div class="topbar"><button class="back-btn" onclick="state.screen='module';render()">← Avbryt</button><span class="counter">${qi+1}/${qs.length}</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${((qi+1)/qs.length)*100}%;background:#3b82f6"></div></div>
    <div style="border-radius:16px;overflow:hidden;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.06)">${imgTag(v,"vehicle-img","height:160px")}</div>
    <div style="text-align:center;margin-bottom:16px">
      <div class="pill" style="background:${WC[q.cat]}15"><span style="font-size:14px">${WI[q.cat]}</span><span style="color:${WC[q.cat]};font-weight:800">${WL[q.cat]}</span></div>
      <h3 style="font-size:16px;font-weight:800;margin-top:8px">Vilken <span style="color:${WC[q.cat]}">${WL[q.cat]}</span>-beskrivning hör till <span style="color:#3b82f6">${v.name}</span>?</h3>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">`;

  q.options.forEach((opt,oi)=>{
    let cls='option-btn';
    if(sel!==null){
      if(opt.ok) cls+=' correct';
      else if(oi===sel) cls+=' wrong';
    }
    const txt=opt.txt.length>110?opt.txt.slice(0,110)+'…':opt.txt;
    html+=`<button class="${cls}" ${sel===null?`onclick="qwSelect(${oi})"`:''}>${txt}${sel!==null?`<div style="font-size:11px;color:#94a3b8;margin-top:4px;font-style:italic">— ${getV(opt.vid).name}</div>`:''}</button>`;
  });

  html+=`</div>`;

  if(sel!==null){
    const ok=q.options[sel].ok;
    html+=`<div class="feedback ${ok?'correct':'wrong'}"><div class="inner">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <span style="font-size:28px;animation:pop .3s ease">${ok?'🎉':'😬'}</span>
        <span style="font-weight:900;font-size:20px;color:${ok?'#16a34a':'#dc2626'}">${ok?'Rätt!':'Fel!'}</span>
        ${ok?'<span style="margin-left:auto;color:#16a34a;font-weight:800;font-size:14px">+10 XP</span>':''}
      </div>
      ${!ok?`<p style="color:#475569;font-size:14px;line-height:1.5;margin-bottom:12px">Rätt svar tillhör ${v.name}</p>`:''}
      <button class="btn-primary" style="background:${ok?'#16a34a':'#dc2626'}" onclick="qwNext()">FORTSÄTT</button>
    </div></div>`;
  }

  html+=`</div>`;
  app.innerHTML=html;
}
window.qwSelect=function(oi){
  qwState.sel=oi;
  if(qwState.qs[qwState.qi].options[oi].ok){qwState.score++;state.xp+=10;save();}
  renderQuizWhat();
};
window.qwNext=function(){
  qwState.qi++;qwState.sel=null;
  renderQuizWhat();
  window.scrollTo({top:0,behavior:'smooth'});
};

// ── QUIZ-ID ──
let qiState={};
function initQuizId(catId){
  const vids=catId==="master"?V.map(v=>v.id):V.filter(v=>v.cat===catId).map(v=>v.id);
  const qs=shuffle(vids).map(vid=>{
    const v=getV(vid);
    const sameCat=shuffle(V.filter(x=>x.id!==vid&&x.cat===v.cat).map(x=>x.id)).slice(0,1);
    const diffCat=shuffle(V.filter(x=>x.id!==vid&&x.cat!==v.cat).map(x=>x.id)).slice(0,2);
    const wrongs=[...sameCat,...diffCat].slice(0,3);
    return{v,options:shuffle([{name:v.name,id:v.id,ok:true},...wrongs.map(w=>({name:getV(w).name,id:w,ok:false}))])};
  });
  qiState={qs,qi:0,sel:null,score:0,hint:false,hints:0,catId};
  renderQuizId();
}
function renderQuizId(){
  const{qs,qi,sel,score,hint,catId}=qiState;
  if(qi>=qs.length){
    const passed=score>=qs.length*.6;
    app.innerHTML=`<div class="page" style="padding-top:80px;text-align:center">
      <div style="font-size:64px;animation:pop .4s ease">${score>=qs.length*.8?'🎖️':score>=qs.length*.5?'💪':'🔄'}</div>
      <h2 style="font-size:28px;font-weight:900;margin-top:16px">${score}/${qs.length} rätt!</h2>
      <p style="color:#64748b;margin:8px 0 30px">${passed?'Starkt! Du kan identifiera fordonen!':'Studera bilderna mer!'}</p>
      <button class="btn-primary" style="background:${passed?'#16a34a':'#f59e0b'};max-width:280px;margin:0 auto" onclick="${passed?`state.done['${catId}-quiz-id']=true;save();`:''}state.screen='module';render()">
        ${passed?'FORTSÄTT ✓':'FÖRSÖK IGEN'}
      </button>
    </div>`;
    return;
  }
  const q=qs[qi];
  const v=q.v;

  let html=`<div class="page" style="padding-bottom:${sel!==null?'160':'40'}px">
    <div class="topbar"><button class="back-btn" onclick="state.screen='module';render()">← Avbryt</button><span class="counter">${qi+1}/${qs.length}</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${((qi+1)/qs.length)*100}%;background:#ef4444"></div></div>
    <div style="text-align:center;margin-bottom:12px"><div class="pill" style="background:#fef2f2;border:1px solid #fecaca">🎯 <span style="color:#dc2626;font-weight:800">IDENTIFIERA</span></div></div>
    <div style="border-radius:20px;overflow:hidden;margin-bottom:16px;box-shadow:0 4px 24px rgba(0,0,0,.1)">${imgTag(v,"vehicle-img")}</div>
    <h3 style="text-align:center;font-size:18px;font-weight:800;margin-bottom:16px">Vilket fordon är detta?</h3>`;

  if(!hint){
    html+=`<button class="hint-btn" style="margin-bottom:14px" onclick="qiState.hint=true;qiState.hints++;renderQuizId()">💡 Visa ledtråd (−10 XP)</button>`;
  } else {
    html+=`<div style="background:#fffbeb;border:1.5px solid #fde68a;border-radius:14px;padding:14px;margin-bottom:14px">
      <div style="font-size:11px;color:#92400e;font-weight:800;margin-bottom:6px;letter-spacing:1px">LEDTRÅDAR</div>
      ${v.tips.slice(0,2).map(t=>`<div class="tip-item">${t}</div>`).join("")}
    </div>`;
  }

  html+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">`;
  q.options.forEach((opt,oi)=>{
    let cls='id-option';
    if(sel!==null){
      if(opt.ok) cls+=' correct';
      else if(oi===sel) cls+=' wrong';
    }
    html+=`<button class="${cls}" ${sel===null?`onclick="qiSelect(${oi})"`:''}>${opt.name}</button>`;
  });
  html+=`</div>`;

  if(sel!==null){
    const ok=q.options[sel].ok;
    html+=`<div class="feedback ${ok?'correct':'wrong'}"><div class="inner">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <span style="font-size:28px;animation:pop .3s ease">${ok?'🎉':'😬'}</span>
        <span style="font-weight:900;font-size:20px;color:${ok?'#16a34a':'#dc2626'}">${ok?'Rätt!':'Fel!'}</span>
        ${ok?`<span style="margin-left:auto;color:#16a34a;font-weight:800;font-size:14px">+${hint?5:15} XP</span>`:''}
      </div>
      ${!ok?`<p style="color:#475569;font-size:14px;line-height:1.5;margin-bottom:12px">Det var <b>${v.name}</b> (${v.type}). ${v.tips[0]}</p>`:''}
      <button class="btn-primary" style="background:${ok?'#16a34a':'#dc2626'}" onclick="qiNext()">FORTSÄTT</button>
    </div></div>`;
  }

  html+=`</div>`;
  app.innerHTML=html;
}
window.qiSelect=function(oi){
  qiState.sel=oi;
  if(qiState.qs[qiState.qi].options[oi].ok){qiState.score++;state.xp+=qiState.hint?5:15;save();}
  renderQuizId();
};
window.qiNext=function(){
  qiState.qi++;qiState.sel=null;qiState.hint=false;
  renderQuizId();
  window.scrollTo({top:0,behavior:'smooth'});
};

// Global helper
window.startLesson=startLesson;

// Initial render
render();
</script>
</body>
</html>
