try{var sv=localStorage.getItem("wt2");if(sv){var p=JSON.parse(sv);xp=p.x||0;done=p.d||{}}}catch(e){}
function save(){try{localStorage.setItem("wt2",JSON.stringify({x:xp,d:done}))}catch(e){}}

var $=document.getElementById("app");
var screen="home", curMod=null;

/* ══════════════════════════════════════════
   HELPERS
   ══════════════════════════════════════════ */
function h(tag,attrs,children){
  var s="<"+tag;
  if(attrs)for(var k in attrs)if(attrs.hasOwnProperty(k))s+=" "+k+'="'+attrs[k]+'"';
  s+=">";
  if(children!==undefined)s+=children;
  s+="</"+tag+">";
  return s;
}
function imgHtml(v,height,radius){
  var r=radius||"16px";
  var ht=height||"220px";
  return '<img src="'+v.img+'" alt="'+v.name+'" style="width:100%;height:'+ht+';object-fit:cover;background:#e2e8f0;border-radius:'+r+';display:block" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">'
    +'<div style="display:none;width:100%;height:'+ht+';border-radius:'+r+';background:#f1f5f9;border:2px dashed #cbd5e1;align-items:center;justify-content:center;flex-direction:column;font-size:11px;color:#94a3b8;font-weight:700">'
    +'<span style="font-size:28px;margin-bottom:2px">'+(CC[v.cat]?CC[v.cat].e:"")+' </span>'+v.name+'</div>';
}

function go(s,mod){screen=s;curMod=mod||curMod;render();window.scrollTo({top:0,behavior:"instant"})}

/* ══════════════════════════════════════════
   RENDER ROUTER
   ══════════════════════════════════════════ */
function render(){
  if(screen==="home") renderHome();
  else if(screen==="module") renderModule();
  else if(screen==="learn") renderLearn();
  else if(screen==="qw") renderQW();
  else if(screen==="qi") renderQI();
}

/* ══════════════════════════════════════════
   QUIZ WHAT
   ══════════════════════════════════════════ */
var QW={qs:[],qi:0,sel:-1,score:0};
function initQW(){
  var vids=vidsFor(curMod);
  var qs=shuffle(vids).map(function(vid){
    var cat=WHAT_KEYS[Math.floor(Math.random()*4)];
    var v=gv(vid);
    var wrongs=shuffle(vids.filter(function(id){return id!==vid})).slice(0,3);
    while(wrongs.length<3){var extras=shuffle(V.filter(function(x){return vids.indexOf(x.id)<0}).map(function(x){return x.id}));wrongs.push(extras[0])}
    return{v:v,cat:cat,opts:shuffle([{txt:v.what[cat],vid:vid,ok:true}].concat(wrongs.map(function(w){return{txt:gv(w).what[cat],vid:w,ok:false}})))};
  });
  QW={qs:qs,qi:0,sel:-1,score:0};
  renderQW();
}
function renderQW(){
  var qi=QW.qi, qs=QW.qs;
  if(qi>=qs.length){
    var passed=QW.score>=qs.length*.6;
    $.innerHTML='<div style="padding:80px 20px;text-align:center"><div style="font-size:64px;animation:pop .4s ease">'+(QW.score>=qs.length*.8?"\u{1F3C6}":QW.score>=qs.length*.5?"\u{1F44D}":"\u{1F4DA}")+'</div><h2 style="font-size:28px;font-weight:900;margin-top:16px">'+QW.score+'/'+qs.length+' r\u00e4tt!</h2><p style="color:#64748b;margin:8px 0 30px;font-size:15px">'+(passed?"Bra jobbat!":"\u00d6va mer och f\u00f6rs\u00f6k igen!")+'</p><button data-action="qw-done" data-passed="'+(passed?1:0)+'" style="padding:14px 48px;background:'+(passed?"#16a34a":"#f59e0b")+';color:#fff;border-radius:14px;font-weight:800;font-size:16px">'+(passed?"FORTS\u00c4TT \u2713":"F\u00d6RS\u00d6K IGEN")+'</button></div>';
    return;
  }
  var q=qs[qi], v=q.v, sel=QW.sel;
  var out='<div style="padding:0 20px '+(sel>=0?"160":"40")+'px">';
  out+='<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0"><button data-go="module" style="color:#3b82f6;font-size:15px;padding:16px 0;font-weight:700">\u2190 Avbryt</button><span style="font-size:13px;color:#94a3b8;font-weight:700">'+(qi+1)+'/'+qs.length+'</span></div>';
  out+='<div style="height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin-bottom:20px"><div style="height:100%;border-radius:3px;width:'+((qi+1)/qs.length*100)+'%;background:#3b82f6;transition:width .4s"></div></div>';
  out+='<div style="border-radius:16px;overflow:hidden;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.06)">'+imgHtml(v,"160px","0")+'</div>';
  out+='<div style="text-align:center;margin-bottom:16px"><div style="display:inline-flex;align-items:center;gap:6px;background:'+WC[q.cat]+'15;border-radius:24px;padding:4px 14px"><span style="font-size:14px">'+WI[q.cat]+'</span><span style="color:'+WC[q.cat]+';font-weight:800;font-size:12px">'+WL[q.cat]+'</span></div>';
  out+='<h3 style="font-size:16px;font-weight:800;margin-top:8px">Vilken beskrivning av <span style="color:'+WC[q.cat]+'">'+WL[q.cat]+'</span> st\u00e4mmer f\u00f6r <span style="color:#3b82f6">'+v.name+'</span>?</h3></div>';
  out+='<div style="display:flex;flex-direction:column;gap:8px">';
  q.opts.forEach(function(opt,oi){
    var bg="#fff",bc="#e2e8f0";
    if(sel>=0){if(opt.ok){bg="#f0fdf4";bc="#4ade80"}else if(oi===sel){bg="#fef2f2";bc="#ef4444"}}
    var txt=opt.txt.length>110?opt.txt.slice(0,110)+"\u2026":opt.txt;
    out+='<button data-qw-opt="'+oi+'" style="background:'+bg+';border:2px solid '+bc+';border-radius:14px;padding:14px;text-align:left;font-size:13px;color:#475569;line-height:1.5;width:100%'+(sel>=0?";pointer-events:none":"")+'">'+txt;
    if(sel>=0)out+='<div style="font-size:11px;color:#94a3b8;margin-top:4px;font-style:italic">\u2014 '+gv(opt.vid).name+'</div>';
    out+='</button>';
  });
  out+='</div>';
  if(sel>=0){
    var ok=q.opts[sel].ok;
    out+='<div style="position:fixed;bottom:0;left:0;right:0;padding:20px 20px calc(20px + env(safe-area-inset-bottom,14px));z-index:100;animation:slideUp .25s ease;background:'+(ok?"#f0fdf4":"#fef2f2")+';border-top:3px solid '+(ok?"#4ade80":"#ef4444")+'"><div style="max-width:480px;margin:0 auto"><div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><span style="font-size:28px;animation:pop .3s ease">'+(ok?"\u{1F389}":"\u{1F62C}")+'</span><span style="font-weight:900;font-size:20px;color:'+(ok?"#16a34a":"#dc2626")+'">'+(ok?"R\u00e4tt!":"Fel!")+'</span>'+(ok?'<span style="margin-left:auto;color:#16a34a;font-weight:800;font-size:14px">+10 XP</span>':"")+'</div>';
    if(!ok)out+='<p style="color:#475569;font-size:14px;line-height:1.5;margin-bottom:12px">R\u00e4tt svar tillh\u00f6r '+v.name+'</p>';
    out+='<button data-action="qw-next" style="width:100%;padding:14px;border-radius:14px;font-weight:800;font-size:16px;color:#fff;background:'+(ok?"#16a34a":"#dc2626")+'">FORTS\u00c4TT</button></div></div>';
  }
  out+='</div>';
  $.innerHTML=out;

/* ══════════════════════════════════════════
   QUIZ ID
   ══════════════════════════════════════════ */
var QI={qs:[],qi:0,sel:-1,score:0,hint:false};
function initQI(){
  var vids=vidsFor(curMod);
  var qs=shuffle(vids).map(function(vid){
    var v=gv(vid);
    var sameCat=shuffle(V.filter(function(x){return x.id!==vid&&x.cat===v.cat}).map(function(x){return x.id})).slice(0,1);
    var diffCat=shuffle(V.filter(function(x){return x.id!==vid&&x.cat!==v.cat}).map(function(x){return x.id})).slice(0,2);
    var wrongs=sameCat.concat(diffCat).slice(0,3);
    return{v:v,opts:shuffle([{name:v.name,id:v.id,ok:true}].concat(wrongs.map(function(w){return{name:gv(w).name,id:w,ok:false}})))};
  });
  QI={qs:qs,qi:0,sel:-1,score:0,hint:false};
  renderQI();
}
function renderQI(){
  var qi=QI.qi, qs=QI.qs;
  if(qi>=qs.length){
    var passed=QI.score>=qs.length*.6;
    $.innerHTML='<div style="padding:80px 20px;text-align:center"><div style="font-size:64px;animation:pop .4s ease">'+(QI.score>=qs.length*.8?"\u{1F396}\uFE0F":QI.score>=qs.length*.5?"\u{1F4AA}":"\u{1F504}")+'</div><h2 style="font-size:28px;font-weight:900;margin-top:16px">'+QI.score+'/'+qs.length+' r\u00e4tt!</h2><p style="color:#64748b;margin:8px 0 30px">'+(passed?"Starkt!":"Studera bilderna mer!")+'</p><button data-action="qi-done" data-passed="'+(passed?1:0)+'" style="padding:14px 48px;background:'+(passed?"#16a34a":"#f59e0b")+';color:#fff;border-radius:14px;font-weight:800;font-size:16px">'+(passed?"FORTS\u00c4TT \u2713":"F\u00d6RS\u00d6K IGEN")+'</button></div>';
    return;
  }
  var q=qs[qi], v=q.v, sel=QI.sel;
  var out='<div style="padding:0 20px '+(sel>=0?"160":"40")+'px">';
  out+='<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0"><button data-go="module" style="color:#3b82f6;font-size:15px;padding:16px 0;font-weight:700">\u2190 Avbryt</button><span style="font-size:13px;color:#94a3b8;font-weight:700">'+(qi+1)+'/'+qs.length+'</span></div>';
  out+='<div style="height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin-bottom:20px"><div style="height:100%;border-radius:3px;width:'+((qi+1)/qs.length*100)+'%;background:#ef4444;transition:width .4s"></div></div>';
  out+='<div style="text-align:center;margin-bottom:12px"><div style="display:inline-flex;align-items:center;gap:6px;background:#fef2f2;border:1px solid #fecaca;border-radius:24px;padding:4px 14px">\u{1F3AF} <span style="color:#dc2626;font-weight:800;font-size:12px">IDENTIFIERA</span></div></div>';
  out+='<div style="border-radius:20px;overflow:hidden;margin-bottom:16px;box-shadow:0 4px 24px rgba(0,0,0,.1)">'+imgHtml(v,"220px","0")+'</div>';
  out+='<h3 style="text-align:center;font-size:18px;font-weight:800;margin-bottom:16px">Vilket fordon \u00e4r detta?</h3>';

  if(!QI.hint){
    out+='<button data-action="qi-hint" style="width:100%;padding:10px;background:#fffbeb;border:1.5px dashed #fde68a;border-radius:12px;color:#92400e;font-size:13px;font-weight:700;margin-bottom:14px">\u{1F4A1} Visa ledtr\u00e5d (\u221210 XP)</button>';
  } else {
    out+='<div style="background:#fffbeb;border:1.5px solid #fde68a;border-radius:14px;padding:14px;margin-bottom:14px"><div style="font-size:11px;color:#92400e;font-weight:800;margin-bottom:6px;letter-spacing:1px">LEDTR\u00c5DAR</div>';
    v.tips.slice(0,2).forEach(function(t){out+='<div style="color:#78350f;font-size:13px;line-height:1.6;padding:2px 0 2px 20px;position:relative"><span style="position:absolute;left:6px;color:#f59e0b;font-weight:800">\u203A</span>'+t+'</div>'});
    out+='</div>';
  }

  out+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">';
  q.opts.forEach(function(opt,oi){
    var bg="#fff",bc="#e2e8f0",col="#0f172a";
    if(sel>=0){if(opt.ok){bg="#f0fdf4";bc="#4ade80";col="#16a34a"}else if(oi===sel){bg="#fef2f2";bc="#ef4444";col="#dc2626"}}
    out+='<button data-qi-opt="'+oi+'" style="background:'+bg+';border:2px solid '+bc+';border-radius:14px;padding:14px 10px;font-weight:800;font-size:14px;color:'+col+';text-align:center'+(sel>=0?";pointer-events:none":"")+'">'+opt.name+'</button>';
  });
  out+='</div>';

  if(sel>=0){
    var ok=q.opts[sel].ok;
    out+='<div style="position:fixed;bottom:0;left:0;right:0;padding:20px 20px calc(20px + env(safe-area-inset-bottom,14px));z-index:100;animation:slideUp .25s ease;background:'+(ok?"#f0fdf4":"#fef2f2")+';border-top:3px solid '+(ok?"#4ade80":"#ef4444")+'"><div style="max-width:480px;margin:0 auto"><div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><span style="font-size:28px;animation:pop .3s ease">'+(ok?"\u{1F389}":"\u{1F62C}")+'</span><span style="font-weight:900;font-size:20px;color:'+(ok?"#16a34a":"#dc2626")+'">'+(ok?"R\u00e4tt!":"Fel!")+'</span>'+(ok?'<span style="margin-left:auto;color:#16a34a;font-weight:800;font-size:14px">+'+(QI.hint?5:15)+' XP</span>':"")+'</div>';
    if(!ok)out+='<p style="color:#475569;font-size:14px;line-height:1.5;margin-bottom:12px">Det var <b>'+v.name+'</b> ('+v.type+'). '+v.tips[0]+'</p>';
    out+='<button data-action="qi-next" style="width:100%;padding:14px;border-radius:14px;font-weight:800;font-size:16px;color:#fff;background:'+(ok?"#16a34a":"#dc2626")+'">FORTS\u00c4TT</button></div></div>';
  }
  out+='</div>';
  $.innerHTML=out;
}

/* ══════════════════════════════════════════
   EVENT DELEGATION (no inline onclick!)
   ══════════════════════════════════════════ */
document.addEventListener("click",function(e){
  var el=e.target;
  // walk up to find data attributes
  for(var i=0;i<6;i++){
    if(!el||el===document.body)break;

    // Navigation
    if(el.dataset.go){
      if(el.dataset.go==="home"){go("home")}
      else if(el.dataset.go==="module"){
        if(el.dataset.mod)curMod=el.dataset.mod;
        go("module");
      }
      return;
    }

    // Start lesson
    if(el.dataset.lesson){
      var lt=el.dataset.lesson;
      screen=lt;
      if(lt==="learn")initLearn();
      else if(lt==="qw")initQW();
      else if(lt==="qi")initQI();
      return;
    }

    // WHAT card expand
    if(el.dataset.what!==undefined){
      LS.exp=LS.exp===el.dataset.what?null:el.dataset.what;
      renderLearn();
      return;
    }

    // Actions
    if(el.dataset.action){
      var a=el.dataset.action;
      if(a==="tips"){LS.tips=!LS.tips;renderLearn()}
      else if(a==="learn-next"){
        if(LS.vi<LS.vids.length-1){LS.vi++;LS.exp=null;LS.tips=false;renderLearn();window.scrollTo({top:0,behavior:"smooth"})}
        else{xp+=30;done[curMod+"-learn"]=true;save();go("module")}
      }
      else if(a==="qw-next"){QW.qi++;QW.sel=-1;renderQW();window.scrollTo({top:0,behavior:"smooth"})}
      else if(a==="qw-done"){if(el.dataset.passed==="1"){done[curMod+"-qw"]=true;save()}go("module")}
      else if(a==="qi-hint"){QI.hint=true;renderQI()}
      else if(a==="qi-next"){QI.qi++;QI.sel=-1;QI.hint=false;renderQI();window.scrollTo({top:0,behavior:"smooth"})}
      else if(a==="qi-done"){if(el.dataset.passed==="1"){done[curMod+"-qi"]=true;save()}go("module")}
      return;
    }

    // Quiz what option
    if(el.dataset.qwOpt!==undefined){
      if(QW.sel>=0)return;
      var oi=parseInt(el.dataset.qwOpt);
      QW.sel=oi;
      if(QW.qs[QW.qi].opts[oi].ok){QW.score++;xp+=10;save()}
      renderQW();
      return;
    }

    // Quiz ID option
    if(el.dataset.qiOpt!==undefined){
      if(QI.sel>=0)return;
      var oi2=parseInt(el.dataset.qiOpt);
      QI.sel=oi2;
      if(QI.qs[QI.qi].opts[oi2].ok){QI.score++;xp+=(QI.hint?5:15);save()}
      renderQI();
      return;
    }

    el=el.parentElement;
  }
});

/* Initial render */
render();

})();
</script>
</body>
</html>
