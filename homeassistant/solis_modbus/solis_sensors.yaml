#path /homeassistant/solis_modbus/solis_sensors.yaml
modbus:
  - name: solis_inverter
    type: tcp
    host: 192.168.1.132
    port: 502
    slave: 1
    
    sensors:
      - name: "Solis Battery SOC"
        unique_id: solis_battery_soc
        address: 33139
        input_type: input
        unit_of_measurement: "%"
        data_type: uint16
        device_class: battery
        state_class: measurement
        scan_interval: 60

      - name: "Solis Battery Power Raw"
        unique_id: solis_battery_power_raw
        address: 33149
        input_type: input
        unit_of_measurement: "W"
        data_type: int32
        device_class: power
        state_class: measurement
        scan_interval: 10

      - name: "Solis Battery Direction"
        unique_id: solis_battery_direction
        address: 33135
        input_type: input
        data_type: uint16
        scan_interval: 10
        
      - name: "Solis Total Battery Charge"
        unique_id: solis_total_battery_charge
        address: 33161
        input_type: input
        unit_of_measurement: "kWh"
        data_type: uint32
        device_class: energy
        state_class: total_increasing
        scan_interval: 60

      - name: "Solis Total Battery Discharge"
        unique_id: solis_total_battery_discharge
        address: 33165
        input_type: input
        unit_of_measurement: "kWh"
        data_type: uint32
        device_class: energy
        state_class: total_increasing
        scan_interval: 60
        
      - name: "Solis Battery Charge Today"
        unique_id: solis_battery_charge_today
        address: 33163
        input_type: input
        unit_of_measurement: "kWh"
        scale: 0.1
        precision: 1
        data_type: uint16
        device_class: energy
        state_class: total_increasing
        scan_interval: 60

      - name: "Solis Battery Discharge Today"
        unique_id: solis_battery_discharge_today
        address: 33167
        input_type: input
        unit_of_measurement: "kWh"
        scale: 0.1
        precision: 1
        data_type: uint16
        device_class: energy
        state_class: total_increasing
        scan_interval: 60
    # --- Batterihälsa & Statistik (Uppdateras 1ggr/timme) ---
      # Källa: RS485_MODBUS(ESINV-33000ID) PDF - Register 33144
      - name: "Solis Battery Cycles"
        unique_id: solis_battery_cycles
        address: 33144
        input_type: input
        unit_of_measurement: "cycles"
        data_type: uint16
        state_class: total_increasing
        scan_interval: 3600

      # Källa: Systemdokumentation Solis Modbus PDF - Register 33140
      - name: "Solis Battery SOH"
        unique_id: solis_battery_soh
        address: 33140
        input_type: input
        unit_of_measurement: "%"
        data_type: uint16
        device_class: battery
        state_class: measurement
        scan_interval: 3600

      # Källa: Systemdokumentation Solis Modbus PDF - Register 33111
      - name: "Solis BMS Status"
        unique_id: solis_bms_status
        address: 33111
        input_type: input
        data_type: uint16
        scan_interval: 120


      # Källa: Systemdokumentation Solis Modbus PDF - Register 33046 (0.1C)
      - name: "Solis Battery Temperature"
        unique_id: solis_battery_temperature
        address: 33046
        input_type: input
        unit_of_measurement: "°C"
        data_type: int16
        scale: 0.1
        precision: 1
        device_class: temperature
        state_class: measurement
        scan_interval: 120
    

# Template-sensor för snygg visning
template:
  - sensor:
      - name: "Solis Battery Power Smart"
        unique_id: solis_battery_power_smart
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:battery-charging
        state: >
          {% set power = states('sensor.solis_battery_power_raw') | float(0) | abs %}
          {% set direction = states('sensor.solis_battery_direction') | int(0) %}
          {% if direction == 0 %}
            {{ power }}
          {% else %}
            {{ -power }}
          {% endif %}
        attributes:
          status: >
            {% if states('sensor.solis_battery_direction') | int(0) == 0 %}
              Laddar
            {% else %}
              Laddar ur
            {% endif %}