# path /homeassistant/garo_chargebox/pkg_garo_chargebox.yaml
sensor:
  - platform: rest
    name: Laddbox
    resource: http://192.168.1.202:8080/servlet/rest/chargebox/status
    scan_interval: 5 # Hämtar data var 15:e sekund för att inte överlasta
    json_attributes:
      - mode
      - currentLimit
      - powerMode
      - latestReading
      - currentTemperature
      - mainCharger
      - twinCharger
      - switchCurrentLimit
    value_template: '{{ value_json.connector }}'

### Rest commands for turning on and off / making charging available and setting chargelimit.
rest_command:
  chargebox_chargelimit:
    url: 'http://192.168.1.202:8080/servlet/rest/chargebox/currentlimit'
    method: post
    content_type: 'application/json'
    payload: '{"reducedIntervalsEnabled": "{{ enabled }}","reducedCurrentIntervals": [{"chargeLimit": "{{ chargelimit }}"}]}'

  chargebox_off:
    url: 'http://192.168.1.202:8080/servlet/rest/chargebox/mode/ALWAYS_OFF'
    method: post

  chargebox_on:
    url: 'http://192.168.1.202:8080/servlet/rest/chargebox/mode/ALWAYS_ON'
    method: post

  chargebox_schema:
    url: 'http://192.168.1.202:8080/servlet/rest/chargebox/mode/SCHEMA'
    method: post

### Input selector dropdown
input_select:
  chargebox_mode:
    name: Laddbox läge
    options:
      - "På"
      - "Schema"
      - "Av"
    icon: mdi:power-settings

### Input slider for chargelimit.
input_number:
  chargebox_limit:
    name: 'Laddbox max laddström'
    mode: slider
    min: 6
    max: 16
    icon: mdi:car-speed-limiter
    unit_of_measurement: "A"

### Chargebox automations
automation:
  # Trigger from input selector dropdown to select mode and run rest command
  - alias: "Change chargebox mode"
    description: "Change chargebox mode based on dropdown menu selection"
    mode: single
    trigger:
      - platform: state
        entity_id: input_select.chargebox_mode
    action:
      - service: >
          {% set box_mode = {
            'På' : 'chargebox_on',
            'Schema' : 'chargebox_schema',
            'Av' : 'chargebox_off'
          } %}
          rest_command.{{ box_mode.get(trigger.to_state.state, 'chargebox_schema') }}

  # Fetch mode from chargebox sensor attribute and ensure dropdown is kept in sync
  - alias: "Update chargebox mode selector"
    mode: single
    trigger:
      - platform: state
        entity_id: sensor.laddbox
        attribute: mode
    condition:
      - condition: not
        conditions:
          - condition: state
            entity_id: sensor.laddbox
            state: "unavailable"
          - condition: state
            entity_id: sensor.laddbox
            state: "unknown"
    action:
      - service: input_select.select_option
        target:
          entity_id: input_select.chargebox_mode
        data:
          option: >
            {% set box_mode = {
              'ALWAYS_ON' : 'På',
              'SCHEMA' : 'Schema',
              'ALWAYS_OFF' : 'Av'
            } %}
            {{ box_mode.get(state_attr('sensor.laddbox', 'mode'), 'Schema') }}

  # Set chargelimit from input slider
  - alias: "Change chargebox currentlimit"
    description: "Change chargebox currentlimit based on input slider."
    mode: single
    trigger:
      - platform: state
        entity_id: input_number.chargebox_limit
    action:
      - service: rest_command.chargebox_chargelimit
        data:
          enabled: "true"
          chargelimit: "{{ states('input_number.chargebox_limit') | int }}"

  # Fetch actual currentlimit from chargebox and set the chargelimit slider.
  - alias: "Update chargebox limit slider"
    mode: single
    trigger:
      - platform: state
        entity_id: sensor.laddbox
        attribute: currentLimit
    condition:
      - condition: template
        value_template: "{{ state_attr('sensor.laddbox', 'currentLimit') is not none }}"
    action:
      - service: input_number.set_value
        target:
          entity_id: input_number.chargebox_limit
        data:
          value: "{{ state_attr('sensor.laddbox', 'currentLimit') | float }}"

### Templates to convert units and set separate sensors from attributes.
template:
  - sensor:
      - unique_id: 'laddbox_Mainchargingcurrent'
        name: 'Aktuell laddström Main'
        icon: mdi:lightning-bolt-circle
        unit_of_measurement: 'A'
        state_class: measurement
        state: >
          {% set main = state_attr('sensor.laddbox', 'mainCharger') %}
          {% if main and main.currentChargingCurrent is defined %}
            {{ (main.currentChargingCurrent / 1000) | round(1) }}
          {% else %}
            0
          {% endif %}

      - unique_id: 'laddbox_Mainchargingpower'
        name: 'Aktuell förbrukning Main'
        icon: mdi:resistor
        unit_of_measurement: 'kW'
        state_class: measurement
        state: >
          {% set main = state_attr('sensor.laddbox', 'mainCharger') %}
          {% if main and main.currentChargingPower is defined %}
            {{ (main.currentChargingPower / 1000) | round(1) }}
          {% else %}
            0
          {% endif %}

      - unique_id: 'laddbox_Mainsessionenergy'
        name: 'Laddat sedan anslutning Main'
        icon: mdi:clock-start
        state_class: measurement
        unit_of_measurement: 'kWh'
        state: >
          {% set main = state_attr('sensor.laddbox', 'mainCharger') %}
          {% if main and main.accSessionEnergy is defined %}
            {{ (main.accSessionEnergy / 1000) | round(1) }}
          {% else %}
            0
          {% endif %}

      - unique_id: 'laddbox_totalconsumption'
        name: 'Laddbox förbrukning'
        icon: mdi:gauge
        device_class: energy
        state_class: total_increasing
        unit_of_measurement: 'kWh'
        # HÄR ÄR ÄNDRINGEN: Vi kollar om datan finns via availability
        availability: >
          {% set main = state_attr('sensor.laddbox', 'mainCharger') %}
          {% set twin = state_attr('sensor.laddbox', 'twinCharger') %}
          {{ main is not none and twin is not none and main.accEnergy is defined }}
        state: >
          {% set main = state_attr('sensor.laddbox', 'mainCharger') %}
          {% set twin = state_attr('sensor.laddbox', 'twinCharger') %}
          {# Nu kan vi räkna direkt eftersom availability redan kontrollerat att datan finns #}
          {{ ((main.accEnergy | float(0) + twin.accEnergy | float(0)) / 1000) | round(1) }}

      - unique_id: 'laddbox_combined_power'
        name: 'Laddbox Effekt (Total)'
        icon: mdi:flash
        device_class: power
        state_class: measurement
        unit_of_measurement: 'W'
        state: >
          {% set main = state_attr('sensor.laddbox', 'mainCharger') %}
          {% set twin = state_attr('sensor.laddbox', 'twinCharger') %}
          {% if main and twin %}
            {{ (main.currentChargingPower | float(0) + twin.currentChargingPower | float(0)) | round(0) }}
          {% else %}
            0
          {% endif %}

      - unique_id: 'laddbox_temp'
        name: 'Laddbox temp'
        icon: mdi:thermometer
        unit_of_measurement: '°C'
        state_class: measurement
        state: >
          {{ state_attr('sensor.laddbox', 'currentTemperature') | float(0) }}

      - unique_id: 'laddbox_chargerstatus'
        name: 'Laddbox status'
        state: >
          {% set box_status = {
              'CHARGING_FINISHED' : 'Klar',
              'CHARGING_CANCELLED' : 'Avbruten',
              'CHARGING_PAUSED' : 'Pausad av lastbalanserare',
              'NOT_CONNECTED' : 'Ej ansluten',
              'CONNECTED' : 'Ansluten',
              'SEARCH_COMM' : 'Ansluten - söker',
              'CHARGING' : 'Laddar',
              'RCD_FAULT' : 'Skyddsbrytare utlöst',
              'OVERHEAT' : 'Överhettad, begränsad',
              'CRITICAL_TEMPERATURE' : 'Kritisk temperatur',
              'INITIALIZATION' : 'Initierar',
              'CABLE_FAULT' : 'Kabelfel',
              'LOCK_FAULT' : 'Låsfel',
              'CONTACTOR_FAULT' : 'Kontaktorfel',
              'VENT_FAULT' : 'Ventileringsfel',
              'DC_ERROR' : 'DC-fel',
              'DISABLED' : 'Inaktiverad',
              'UNAVAILABLE' : 'Laddning pausad (Master)',
              'REMOTE_DISABLED' : 'Externt deaktiverad',
              'DC_HARDWARE' : 'DC hårdvarufel',
              'CP_FAULT' : 'Kommunikationsfel (CP-signal)',
              'CP_SHORTED' : 'Kommunikationsfel (CP-kortsluten)'
          } %}
          {% set main = state_attr('sensor.laddbox','mainCharger') %}
          {% if main and main.connector is defined %}
             {{ box_status.get(main.connector, main.connector) }}
          {% else %}
             Okänd
          {% endif %}

      - unique_id: 'twin_laddbox_chargingcurrent'
        name: 'Aktuell laddström Twin'
        icon: mdi:lightning-bolt-circle
        unit_of_measurement: 'A'
        state_class: measurement
        state: >
          {% set twin = state_attr('sensor.laddbox', 'twinCharger') %}
          {% if twin and twin.currentChargingCurrent is defined %}
            {{ (twin.currentChargingCurrent / 1000) | round(1) }}
          {% else %}
            0
          {% endif %}

      - unique_id: 'twin_laddbox_chargingpower'
        name: 'Aktuell förbrukning Twin'
        icon: mdi:resistor
        unit_of_measurement: 'kW'
        state_class: measurement
        state: >
          {% set twin = state_attr('sensor.laddbox', 'twinCharger') %}
          {% if twin and twin.currentChargingPower is defined %}
            {{ (twin.currentChargingPower / 1000) | round(1) }}
          {% else %}
            0
          {% endif %}

      - unique_id: 'twin_laddbox_sessionenergy'
        name: 'Laddat sedan anslutning Twin'
        icon: mdi:clock-start
        unit_of_measurement: 'kWh'
        state_class: measurement
        state: >
          {% set twin = state_attr('sensor.laddbox', 'twinCharger') %}
          {% if twin and twin.accSessionEnergy is defined %}
            {{ (twin.accSessionEnergy / 1000) | round(1) }}
          {% else %}
            0
          {% endif %}

### Setting up meters for total consumption over time.
utility_meter:
  laddning_bil_manad:
    source: sensor.laddbox_forbrukning
    cycle: monthly

  laddning_bil_daglig:
    source: sensor.laddbox_forbrukning
    cycle: daily