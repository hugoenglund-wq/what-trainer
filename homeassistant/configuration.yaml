homeassistant:
  packages:
    garo_chargebox: !include garo_chargebox/pkg_garo_chargebox.yaml
    solis_sensors: !include solis_modbus/solis_sensors.yaml
    sma_sensors: !include sma_modbus/sma_sensors.yaml
