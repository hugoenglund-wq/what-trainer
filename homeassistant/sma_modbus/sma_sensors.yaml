# SMA Solar inverter integration
#path /homeassistant/sma_modbus/sma_sensors.yaml
modbus:
  - name: sma_inverter
    type: tcp
    host: 192.168.1.163
    port: 502
    sensors:
      - name: Solar AC Power Raw
        unique_id: raw_sma_ac_power
        unit_of_measurement: W
        slave: 3
        address: 30775
        input_type: input
        data_type: int32

      - name: Solar DC Voltage String 1 Raw
        unique_id: raw_sma_dc_voltage_1
        unit_of_measurement: V
        slave: 3
        address: 30773
        input_type: input
        data_type: int32
        scale: 1.0

      - name: Solar DC Current String 1 Raw
        unique_id: raw_sma_dc_current_1
        unit_of_measurement: A
        slave: 3
        address: 30771
        input_type: input
        data_type: int32
        scale: 0.01

      - name: Solar DC Voltage String 2 Raw
        unique_id: raw_sma_dc_voltage_2
        unit_of_measurement: V
        slave: 3
        address: 30777
        input_type: input
        data_type: int32
        scale: 1.0

      - name: Solar DC Current String 2 Raw
        unique_id: raw_sma_dc_current_2
        unit_of_measurement: A
        slave: 3
        address: 30779
        input_type: input
        data_type: int32
        scale: 0.01

      - name: Solar Daily Energy Raw
        unique_id: raw_sma_daily_energy
        unit_of_measurement: Wh
        slave: 3
        address: 30535
        input_type: input
        data_type: int32
        scale: 1

      - name: Solar Total Energy Raw
        unique_id: raw_sma_total_energy
        unit_of_measurement: kWh
        slave: 3
        address: 30529
        input_type: input
        data_type: int32
        scale: 0.001

template:
  - sensor:

      - name: Solar AC Power
        unique_id: templated_solar_ac_power
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        state: >
          {% set v = states('sensor.solar_ac_power_raw') | float(0) %}
          {% if v < 0 or v > 11000 %}
            0
          {% else %}
            {{ v }}
          {% endif %}

      - name: Solar DC Voltage String 1
        unique_id: templated_solar_dc_voltage_string_1
        unit_of_measurement: V
        state: >
          {% set v = states('sensor.solar_dc_voltage_1_raw') | float(0) %}
          {% if v < 0 or v > 1000 %}
            0
          {% else %}
            {{ v }}
          {% endif %}

      - name: Solar DC Current String 1
        unique_id: templated_solar_dc_current_string_1
        unit_of_measurement: A
        state: >
          {% set v = states('sensor.solar_dc_current_1_raw') | float(0) %}
          {% if v < 0 or v > 20 %}
            0
          {% else %}
            {{ v }}
          {% endif %}

      - name: Solar DC Voltage String 2
        unique_id: templated_solar_dc_voltage_string_2
        unit_of_measurement: V
        state: >
          {% set v = states('sensor.solar_dc_voltage_2_raw') | float(0) %}
          {% if v < 0 or v > 1000 %}
            0
          {% else %}
            {{ v }}
          {% endif %}

      - name: Solar DC Current String 2
        unique_id: templated_solar_dc_current_string_2
        unit_of_measurement: A
        state: >
          {% set v = states('sensor.solar_dc_current_2_raw') | float(0) %}
          {% if v < 0 or v > 20 %}
            0
          {% else %}
            {{ v }}
          {% endif %}

      - name: Solar Daily Energy
        unique_id: templated_solar_daily_energy
        unit_of_measurement: Wh
        device_class: energy
        state_class: total_increasing
        state: >
          {% set v = states('sensor.solar_daily_energy_raw') | float(0) %}
          {% if v < 0 or v > 100000 %}
            0
          {% else %}
            {{ v }}
          {% endif %}

      - name: Solar Total Energy
        unique_id: templated_solar_total_energy
        unit_of_measurement: kWh
        device_class: energy
        state_class: total_increasing
        state: >
          {% set v = states('sensor.solar_total_energy_raw') | float(0) %}
          {% if v < 0 %}
            0
          {% else %}
            {{ v }}
          {% endif %}

